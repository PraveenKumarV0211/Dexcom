name: Build & Deploy GlucoLens

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        working-directory: front-end
        run: |
          npm ci
          npm run build

      - name: Stop app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop glucolens || true

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/demo-0.0.1-SNAPSHOT.jar
          target: /opt/glucolens/
          strip_components: 1

      - name: Copy Frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: front-end/dist/*
          target: /opt/glucolens/frontend/
          strip_components: 2

      - name: Write env and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_HOST,DEXCOM_CLIENT_ID,DEXCOM_CLIENT_SECRET,SNS_TOPIC_ARN,GROK_TOKEN,GEMINI_KEY,HF_TOKEN
          script: |
            cat > /opt/glucolens/.env <<EOF
            DB_HOST=${DB_HOST}
            DEXCOM_CLIENT_ID=${DEXCOM_CLIENT_ID}
            DEXCOM_CLIENT_SECRET=${DEXCOM_CLIENT_SECRET}
            SNS_TOPIC_ARN=${SNS_TOPIC_ARN}
            GROK_TOKEN=${GROK_TOKEN}
            GEMINI_KEY=${GEMINI_KEY}
            HF_TOKEN=${HF_TOKEN}
            EOF
            chmod 600 /opt/glucolens/.env
            cd /opt/glucolens
            mv demo-0.0.1-SNAPSHOT.jar glucolens.jar 2>/dev/null || true
            sudo systemctl start glucolens
            echo "Deployed at $(date)"
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DEXCOM_CLIENT_ID: ${{ secrets.DEXCOM_CLIENT_ID }}
          DEXCOM_CLIENT_SECRET: ${{ secrets.DEXCOM_CLIENT_SECRET }}
          SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}
          GROK_TOKEN: ${{ secrets.GROK_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}